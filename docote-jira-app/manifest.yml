app:
  id: ari:cloud:ecosystem::app/REPLACE_WITH_REAL_APP_ID
  runtime:
    name: nodejs22.x
  licensing:
    enabled: false

modules:
  jira:issuePanel:
    - key: docote-issue-panel
      title: DoCoTe
      icon: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg
      resource: main
      resolver:
        function: resolver
  function:
    - key: resolver
      handler: src/index.handler

resources:
  - key: main
    path: static/main

permissions:
  scopes:
    - read:jira-work
    - read:jira-user
    - storage:app
  external:
    fetch:
      backend:
        - https://api.openai.com

